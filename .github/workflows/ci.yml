name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14   # Apple Silicon; matches the app's arm64 / macOS 14 target
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Self-test (offline)
        run: .build/debug/ClaudeUsage --selftest
